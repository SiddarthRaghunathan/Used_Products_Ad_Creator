<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI resale listing assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 100px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: #4b5563;
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input[type="file"] {
      margin: 12px 0 16px;
      display: block;
    }

    button {
      background: #0f766e;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      color: #374151;
    }

    .result {
      margin-top: 24px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    .panel {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
    }

    .panel img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }

    .productName {
      font-weight: 700;
      margin-bottom: 12px;
      color: #111827;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    .credit-badge {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(17, 24, 39, 0.92);
      color: #ffffff;
      text-decoration: none;
      border-radius: 999px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .credit-badge:hover {
      transform: translateX(-50%) translateY(-1px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      background: rgba(15, 118, 110, 0.96);
    }

    .linkedin-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
    }

    @media (max-width: 768px) {
      .result {
        grid-template-columns: 1fr;
      }

      .credit-badge {
        left: 50%;
        bottom: 12px;
        transform: translateX(-50%);
        font-size: 12px;
        padding: 9px 12px;
      }

      .credit-badge:hover {
        transform: translateX(-50%) translateY(-1px);
      }

      .linkedin-icon {
        width: 16px;
        height: 16px;
        flex-basis: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="card">
      <h1>AI resale listing assistant</h1>
      <p>Upload a product image to identify the item and estimate a likely resale price range in euros.</p>

      <label for="imageFile">Choose a product image</label>
      <input id="imageFile" type="file" accept="image/*" />
      <button id="runBtn">Analyze image</button>
      <div id="status" class="status"></div>

      <div id="resultBox" class="result hidden">
        <div class="panel">
          <img id="preview" alt="Uploaded product image preview" />
        </div>
        <div class="panel">
          <div id="productName" class="productName"></div>
          <pre id="output"></pre>
        </div>
      </div>
    </div>
  </main>

  <a
    class="credit-badge"
    href="https://www.linkedin.com/in/sid-raghunathan-85b59975/"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Sid Raghunathan LinkedIn profile"
  >
    <span>Created by Sid Raghunathan</span>
    <svg
      class="linkedin-icon"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI resale listing assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px 100px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: #4b5563;
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input[type="file"] {
      margin: 12px 0 16px;
      display: block;
    }

    button {
      background: #0f766e;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      color: #374151;
    }

    .result {
      margin-top: 24px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
    }

    .panel {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
    }

    .panel img {
      width: 100%;
      border-radius: 12px;
      display: block;
    }

    .productName {
      font-weight: 700;
      margin-bottom: 12px;
      color: #111827;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    .credit-badge {
      position: fixed;
      right: 16px;
      bottom: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(17, 24, 39, 0.92);
      color: #ffffff;
      text-decoration: none;
      border-radius: 999px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .credit-badge:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.22);
      background: rgba(15, 118, 110, 0.96);
    }

    .linkedin-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
    }

    @media (max-width: 768px) {
      .result {
        grid-template-columns: 1fr;
      }

      .credit-badge {
        right: 12px;
        bottom: 12px;
        font-size: 12px;
        padding: 9px 12px;
      }

      .linkedin-icon {
        width: 16px;
        height: 16px;
        flex-basis: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="card">
      <h1>AI resale listing assistant</h1>
      <p>Upload a product image to identify the item and estimate a likely resale price range in euros.</p>

      <label for="imageFile">Choose a product image</label>
      <input id="imageFile" type="file" accept="image/*" />
      <button id="runBtn">Analyze image</button>
      <div id="status" class="status"></div>

      <div id="resultBox" class="result hidden">
        <div class="panel">
          <img id="preview" alt="Uploaded product image preview" />
        </div>
        <div class="panel">
          <div id="productName" class="productName"></div>
          <pre id="output"></pre>
        </div>
      </div>
    </div>
  </main>

  <a
    class="credit-badge"
    href="https://www.linkedin.com/in/sid-raghunathan-85b59975/"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Sid Raghunathan LinkedIn profile"
  >
    <span>Created by Sid Raghunathan</span>
    <svg
      class="linkedin-icon"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      aria-hidden="true"
    >
      <path
        fill="currentColor"
        d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.063 2.063 0 1 1 0-4.126 2.063 2.063 0 0 1 0 4.126zM7.114 20.452H3.558V9h3.556v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
      />
    </svg>
  </a>

  <script>
    const imageFile = document.getElementById("imageFile");
    const runBtn = document.getElementById("runBtn");
    const statusEl = document.getElementById("status");
    const resultBox = document.getElementById("resultBox");
    const preview = document.getElementById("preview");
    const output = document.getElementById("output");
    const productNameEl = document.getElementById("productName");

    let previewUrl = null;

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    runBtn.addEventListener("click", async () => {
      const file = imageFile.files[0];
      if (!file) {
        statusEl.textContent = "Please choose an image first.";
        return;
      }

      if (previewUrl) {
        URL.revokeObjectURL(previewUrl);
      }

      previewUrl = URL.createObjectURL(file);
      preview.src = previewUrl;

      runBtn.disabled = true;
      statusEl.textContent = "Analyzing image...";
      resultBox.classList.add("hidden");
      output.textContent = "";
      productNameEl.textContent = "";

      try {
        const imageBase64 = await toBase64(file);

        const response = await fetch("/api/index", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            imageBase64,
            mimeType: file.type || "image/jpeg"
          })
        });

        const rawText = await response.text();
        let data;

        try {
          data = JSON.parse(rawText);
        } catch {
          throw new Error(rawText || "Invalid server response");
        }

        if (!response.ok) {
          throw new Error(data.error || "Request failed");
        }

        productNameEl.textContent = data.product_name
          ? `Detected product: ${data.product_name}`
          : "";

        output.textContent = data.result || "No result returned.";
        resultBox.classList.remove("hidden");
        statusEl.textContent = "Done.";
      } catch (error) {
        statusEl.textContent = "Error: " + error.message;
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
